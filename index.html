<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오픈웨더 날씨 API</title>
    <style>
        .wrap{
            width: 100%;
            height: 100vh;

            position: relative;

            display: flex;
            justify-content: center;
            align-items: center;
        }
            .wrap > img{
                width: 100%;
                height: 100%;

                position: absolute;
                z-index: 1;

                border-radius: 7px;
                object-fit: cover; 
            }
            .inBox{
                width: 900px;
                height: 650px;
                background-color: rgba(192, 192, 192, 0.65); 

                z-index: 2;

                display: flex;
                justify-content: center;
                flex-direction: column;
                align-items: center;

                border-radius: 15px;
                box-shadow: 0px 10px 30px rgba(0,0,0,0.5); 
                padding: 20px;
                box-sizing: border-box;
            }
               
                .inBox > h2 {
                    font-size: 35px;
                    color: #0066ff85; 
                    margin: 0 0 20px 0;
                }

                .inBox > div[id] {
                    font-size: 18px; 
                    color: #000000; 
                    font-weight: bold;
                    margin: 12px 0;
                }

                #con {
                    width: 150px;
                    height: 150px;
                    margin: 10px 0;
                }

                .btn-box {
                    margin-top: 10px; 
                    display: flex;   
                    gap: 20px;   
                    
                    
                }

                .btn-box > button {
                    padding: 15px 35px;
                    font-size: 16px; 
                    font-weight: bold;
                    border: 3px solid #fff;
                    border-radius: 10px;
                    background-color: #ffffff;
                    color: #111111;
                    cursor: pointer;

                    box-shadow: 0px 10px 10px rgba(0,0,0,0.5); 
                }


    </style>

</head>
<body>
    <div class="wrap">
        <img src="./img/sky.jpg" alt="하늘배경">
        <div class="inBox">
            <h2>날씨</h2>
            <div id="dt"></div>
            <div id="dis"></div>
            <div id="wind"></div>
            <div id="description"></div>
            <img id="con" alt="날씨 아이콘"/>

            <div class="btn-box">
                <button onclick="getWeather('Tokyo')">일본</button>
                <button onclick="getWeather('Toronto')">캐나다</button>
                <button onclick="getWeather('Moscow')">러시아</button>
                <button onclick="getWeather('Chile')">칠레</button>

            </div>
        </div>
    </div>

  

    




    




    <script>
        let dis = document.querySelector("#dis")
        let con = document.querySelector("#con")
        
        const API_KEY = '879be6633aa90d15165bf84e6de8391d'
        // const cityname = 'Ansan'
        

        async function getWeather(cityname){
            let res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cityname}&appid=${API_KEY}&units=metric&lang=kr`)
            let data = await res.json() // js가 알 수 있는 객체로 변환


            dis.innerHTML = '온도 : ' + data.main.temp + " ℃" ;

            let wind = document.querySelector("#wind")
            wind.innerHTML = '풍속 : ' + data.wind.speed + " m/s" ; 

            description.innerHTML = '날씨 : ' + data.weather[0].description ; 


            let icon = data.weather[0].icon;
            let iconUrl= `http://openweathermap.org/img/wn/${icon}@2x.png`

            let dt = document.querySelector("#dt")
           
            let date = new Date(data.dt * 1000);
            let timeString = date.toLocaleString('ko-KR'); 
            
            dt.innerHTML = '오늘의 날짜 : ' + timeString ;
            


            console.log(data)

            con.setAttribute('src', iconUrl)

        }
        getWeather()
    </script>
</body>
</html>
